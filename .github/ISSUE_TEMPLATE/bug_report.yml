name: "Bug report"
description: "Report a problem with the Checkiday National Day integration"
labels: ["bug"]
body:
  - type: "markdown"
    attributes:
      value: |
        Before filing a bug, please check that you're on the latest release
        and that your APILayer/Checkiday subscription and API key are valid.
  - type: "textarea"
    id: "description"
    attributes:
      label: "Describe the bug"
      description: "A clear description of what went wrong."
    validations:
      required: true
  - type: "textarea"
    id: "logs"
    attributes:
      label: "Relevant Home Assistant logs"
      description: "Settings → System → Logs, or `custom_components.checkiday` debug logs."
      render: "text"
    validations:
      required: false
  - type: "input"
    id: "integration-version"
    attributes:
      label: "Integration version"
      description: "Found in HACS → Checkiday National Day."
    validations:
      required: true
  - type: "input"
    id: "ha-version"
    attributes:
      label: "Home Assistant Core version"
    validations:
      required: true
  - type: "checkboxes"
    id: "sensitive"
    attributes:
      label: "Confirmation"
      options:
        - label: "I have removed my API key from any logs or screenshots before posting."
          required: true
