name: "Lint"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v4"
      - name: "Set up Python"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"
      - name: "Install ruff"
        run: "pip install ruff"
      - name: "Run ruff check"
        run: "ruff check custom_components/checkiday"
      - name: "Run ruff format check"
        run: "ruff format --check custom_components/checkiday"

  compile:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v4"
      - name: "Set up Python"
        uses: "actions/setup-python@v5"
        with:
          python-version: "3.13"
      - name: "Byte-compile all sources"
        run: "python -m py_compile $(find custom_components/checkiday -name '*.py')"
      - name: "Validate JSON files"
        run: |
          python -c "
          import json, sys, pathlib
          paths = list(pathlib.Path('custom_components/checkiday').rglob('*.json'))
          for p in paths:
              json.loads(p.read_text())
              print(f'OK: {p}')
          "
