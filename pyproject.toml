[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "ASYNC", # flake8-async
]
ignore = [
    "E501", # line length handled by formatter/line-length above
]

[tool.ruff.lint.isort]
force-sort-within-sections = true
combine-as-imports = true
